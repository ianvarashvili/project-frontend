<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>კუნძულის თამაშები</title>
    <link rel="icon" type="image/png" href="../assets/fox-logo.png" />
    <link rel="stylesheet" href="../style/general.css" />
    <link rel="stylesheet" href="../style/island.css" />
  </head>

  <body>
    <header class="island-header header-container">
      <div class="flexrow">
        <a href="home.html">
          <img
            src="../assets/fox-logo.png"
            alt="our website logo of a fox holding a pen"
            class="logo"
          />
        </a>
        <p class="chalk-txt">
          <span class="orange-txt h-title">მელიას</span> <br />
          მათემატიკა
        </p>
      </div>

      <div class="flexrow">
        <div
          id="back-btn"
          class="reg-txt button sketchy-button--sm hover-color-change"
        >
          ← უკან
        </div>
        <a href="home.html" class="anchor-el">
          <div class="reg-txt button sketchy-button--sm push-down-btn">
            პროფილი
          </div>
        </a>
      </div>
    </header>
    <main>
      <div class="island-title-section chalk-txt">
        <h1><span id="island-title"></span></h1>
        <p class="grey-txt reg-txt">აირჩიე თამაში</p>
      </div>

      <div class="games-grid" id="games-grid">
        <p>იტვირთება...</p>
      </div>
    </main>
    <footer class="island-footer">
      <p class="reg-txt">
        2026 წელს შექმნილი ქართველი მოსწავლებიისთვის • მელიას მათემატიკა
      </p>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/island-config.js"></script>
    <script src="../js/island.js"></script>
  </body>
</html>
