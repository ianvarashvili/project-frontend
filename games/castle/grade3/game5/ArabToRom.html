<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩაწერე არაბული ციფრები რომაულად</title>
     <link rel="stylesheet" href="../../../../style/general.css" />
    <link rel="stylesheet" href="../../../../style/games-general.css" />
    <link rel="stylesheet" href="ArabToRom.css">
 >
</head>

<body>
    <defs>
        <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
            <defs>
                <symbol id="icon-time" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </symbol>
                <symbol id="icon-check" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </symbol>
                <symbol id="result-star" viewBox="0 0 24 24">
                    <polygon
                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                    </polygon>
                </symbol>

            </defs>
        </svg>
    </defs>
    <header></header>
    <main>
        <div class="games-container chalk-txt">
            <h1>კოსმოსური მისია: <span class="orange-txt">რომაული რიცხვები</span></h1>
            <div class="game-hud">
                <div class="hud-stat">
                    <svg>
                        <use href="#icon-time"></use>
                    </svg>
                    <span id="timer-display">60 წმ</span>
                </div>

                <div class="hud-stat">
                    <svg>
                        <use href="#icon-check"></use>
                    </svg>
                    <span class="reg-txt">სწორი: <span id="score-display">0</span> </span>
                </div>
            </div>
            <h2 id="feedback-msg">დააჭირე ხომალდს და ჩართე ის!</h2>
            <div id="ufo" class="ufo-cont" onclick="toggleUfo()">
                <div id="ufo-num" class="ufo-txt">0</div>
                <svg id="ufo-svg" width="240" height="200" viewBox="0 0 240 200">
                    <polygon class="ufo-beam" points="70,90 170,90 230,200 10,200" fill="url(#beam-gradient)"
                        pointer-events="none" />
                    <path d="M 70,60 Q 120,10 170,60 Z" fill="#0ca678" opacity="0.4" stroke="#0ca678"
                        stroke-width="2" />
                    <ellipse cx="120" cy="70" rx="90" ry="25" fill="#424242" stroke="#212121" stroke-width="3" />
                    <ellipse cx="120" cy="75" rx="75" ry="15" fill="#616161" />

                    <circle class="ufo-lights" cx="55" cy="75" r="5" fill="#ff00ff" />
                    <circle class="ufo-lights" cx="87" cy="80" r="5" fill="#ff00ff" />
                    <circle class="ufo-lights" cx="120" cy="82" r="5" fill="#ff00ff" />
                    <circle class="ufo-lights" cx="153" cy="80" r="5" fill="#ff00ff" />
                    <circle class="ufo-lights" cx="185" cy="75" r="5" fill="#ff00ff" />

                    <circle cx="120" cy="45" r="24" fill="#0ca678" stroke="#0ca678" stroke-width="2" />

                    <defs>
                        <linearGradient id="beam-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stop-color="#0ca678" stop-opacity="0.8" />
                            <stop offset="100%" stop-color="#0ca678" stop-opacity="0" />
                        </linearGradient>
                        <radialGradient id="gradient-wrong" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#ff7675" />
                            <stop offset="100%" stop-color="#d63031" />
                        </radialGradient>
                    </defs>
                </svg>
            </div>

            <div class="planets-cont">
                <div id="planet-0" class="planet-item" onclick="checkAns(0)">
                    <div id="planet-txt-0" class="planet-txt">-</div>
                    <svg width="160" height="130" viewBox="0 0 160 130">
                        <defs>
                            <radialGradient id="grad-p0" cx="40%" cy="40%" r="60%">
                                <stop offset="0%" stop-color="#ea80fc" />
                                <stop offset="100%" stop-color="#4a148c" />
                            </radialGradient>
                        </defs>
                        <ellipse cx="80" cy="65" rx="70" ry="16" fill="none" stroke="#ba68c8" stroke-width="6"
                            transform="rotate(-15 80 65)" opacity="0.7" />
                        <circle class="planet-sphere" cx="80" cy="65" r="36" fill="url(#grad-p0)" stroke-width="2" />
                    </svg>
                </div>

                <div id="planet-1" class="planet-item" onclick="checkAns(1)">
                    <div id="planet-txt-1" class="planet-txt">-</div>
                    <svg width="160" height="130" viewBox="0 0 160 130">
                        <defs>
                            <radialGradient id="grad-p1" cx="40%" cy="40%" r="60%">
                                <stop offset="0%" stop-color="#69f0ae" />
                                <stop offset="100%" stop-color="#004d40" />
                            </radialGradient>
                        </defs>
                        <circle class="planet-sphere" cx="80" cy="65" r="38" fill="url(#grad-p1)" stroke-width="2" />
                        <path d="M 45,55 Q 80,65 115,55 M 43,70 Q 80,80 117,70" fill="none" stroke="#00c853"
                            stroke-width="2" opacity="0.4" />
                    </svg>
                </div>

                <div id="planet-2" class="planet-item" onclick="checkAns(2)">
                    <div id="planet-txt-2" class="planet-txt">-</div>
                    <svg width="160" height="130" viewBox="0 0 160 130">
                        <defs>
                            <radialGradient id="grad-p2" cx="40%" cy="40%" r="60%">
                                <stop offset="0%" stop-color="#ffb74d" />
                                <stop offset="100%" stop-color="#e65100" />
                            </radialGradient>
                        </defs>
                        <circle class="planet-sphere" cx="80" cy="65" r="36" fill="url(#grad-p2)" stroke-width="2" />
                        <circle cx="60" cy="50" r="5" fill="#bf360c" opacity="0.3" />
                        <circle cx="95" cy="80" r="7" fill="#bf360c" opacity="0.3" />
                        <circle cx="55" cy="82" r="4" fill="#bf360c" opacity="0.3" />
                    </svg>
                </div>
            </div>
        </div>
    </main>
    <div id="start-overlay">
        <div class="result-box">
            <h2 class="chalk-txt">კოსმოსური მისია!</h2>
            <p class="reg-txt grey-txt overlay-subtitle">გაქვს 30 წამი - იპოვე სწორი რომაული!</p>
            <div class="button sketchy-button--lg orange-bg push-down-btn chalk-txt" onclick="handleStartGame()">
                დაწყება
            </div>
        </div>
    </div>

    <div id="result-overlay">
        <div class="result-box">
            <h2 class="chalk-txt">დრო ამოიწურა!</h2>
            <p id="result-count" class="reg-txt"></p>
            <p id="result-improved" class="reg-txt"></p>
            <h3 class="chalk-txt heading-3">ქულა: <strong id="result-score" class="orange-txt"></strong></h3>

            <div class="result-star-container">
                <svg class="result-star">
                    <use href="#result-star"></use>
                </svg>
                <svg class="result-star">
                    <use href="#result-star"></use>
                </svg>
                <svg class="result-star">
                    <use href="#result-star"></use>
                </svg>
            </div>

            <div class="rep-map-btns">
                <button id="btn-replay" class="button sketchy-button--md push-down-btn chalk-txt">თავიდან
                    დაწყება</button>
                <button id="btn-map"
                    class="button sketchy-button--md push-down-btn chalk-txt orange-bg white-txt">კუნძულზე
                    დაბრუნება</button>
            </div>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="result-box chalk-txt">
            შედეგი იგზავნება...
        </div>
    </div>
    <footer></footer>
    

    <script src="../../../../js/config.js"></script>
    <script src="../../../../js/auth.js"></script>
    <script src="../../../../js/game-engine.js"></script>
    <script src="../../../../js/game-submit.js"></script>
    <script src="ArabToRom.js"></script>
</body>

</html>
