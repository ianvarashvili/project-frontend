<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>არითმეტიკული ფუტკარი</title>
    <link rel="stylesheet" href="../../../../style/general.css" />
    <link rel="stylesheet" href="../../../../style/games-general.css" />
    <link rel="stylesheet" href="BeeGame.css" />
  </head>

  <body>
    <defs>
        <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
            <defs>
                <symbol id="icon-time" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </symbol>
                <symbol id="icon-check" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </symbol>
                <symbol id="result-star" viewBox="0 0 24 24">
                    <polygon
                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                    </polygon>
                </symbol>
                <symbol viewBox="0 0 100 100" width="100%" height="100%" id="beeSvg-element">
                    <ellipse cx="35" cy="25" rx="15" ry="22" fill="#e0f7fa" stroke="#37474f" stroke-width="3"
                        transform="rotate(-30 35 25)" />
                    <ellipse cx="50" cy="20" rx="12" ry="18" fill="#e0f7fa" stroke="#37474f" stroke-width="3"
                        transform="rotate(-10 50 20)" />
                    <ellipse cx="50" cy="55" rx="35" ry="25" fill="#ffd54f" stroke="#37474f" stroke-width="4"
                        transform="rotate(-15 50 55)" />
                    <path d="M 42 31 Q 48 40 40 79" fill="none" stroke="#37474f" stroke-width="6" />
                    <path d="M 57 30 Q 62 45 53 79" fill="none" stroke="#37474f" stroke-width="6" />
                    <circle cx="70" cy="48" r="4" fill="#37474f" />
                    <circle cx="68" cy="56" r="4" fill="#ff8a80" />
                    <path d="M 68 35 Q 75 20 82 22" fill="none" stroke="#37474f" stroke-width="3"
                        stroke-linecap="round" />
                    <circle cx="82" cy="22" r="3" fill="#37474f" />
                    <path d="M 74 54 Q 76 58 72 60" fill="none" stroke="#37474f" stroke-width="3"
                        stroke-linecap="round" />
                </symbol>
                <symbol class="flower-svg" viewBox="0 0 100 100" id="flower-1-element">
                    <g fill="#ff7043" stroke="#37474f" stroke-width="3">
                        <circle cx="50" cy="20" r="18" />
                        <circle cx="80" cy="50" r="18" />
                        <circle cx="50" cy="80" r="18" />
                        <circle cx="20" cy="50" r="18" />
                        <circle cx="28" cy="28" r="18" />
                        <circle cx="72" cy="28" r="18" />
                        <circle cx="72" cy="72" r="18" />
                        <circle cx="28" cy="72" r="18" />
                    </g>
                </symbol>
                <symbol class="flower-svg" viewBox="0 0 100 100" id="flower-2-element">
                    <g fill="#ba68c8" stroke="#37474f" stroke-width="3">
                        <circle cx="50" cy="20" r="18" />
                        <circle cx="80" cy="50" r="18" />
                        <circle cx="50" cy="80" r="18" />
                        <circle cx="20" cy="50" r="18" />
                        <circle cx="28" cy="28" r="18" />
                        <circle cx="72" cy="28" r="18" />
                        <circle cx="72" cy="72" r="18" />
                        <circle cx="28" cy="72" r="18" />
                    </g>
                </symbol>
                <symbol class="flower-svg" viewBox="0 0 100 100" id="flower-3-element">
                    <g fill="#ffb74d" stroke="#37474f" stroke-width="3">
                        <circle cx="50" cy="20" r="18" />
                        <circle cx="80" cy="50" r="18" />
                        <circle cx="50" cy="80" r="18" />
                        <circle cx="20" cy="50" r="18" />
                        <circle cx="28" cy="28" r="18" />
                        <circle cx="72" cy="28" r="18" />
                        <circle cx="72" cy="72" r="18" />
                        <circle cx="28" cy="72" r="18" />
                    </g>
                </symbol>
            </defs>
        </svg>
    </defs>
    <header></header>
    <main>
        <div class="games-container chalk-txt">
            <h1>ფუტკარის დახმარება სჭირდება!</h1>
            <div class="game-hud">
                <div class="hud-stat">
                    <svg>
                        <use href="#icon-time"></use>
                    </svg>
                    <span id="timer-display">60 წმ</span>
                </div>

                <div class="hud-stat">
                    <svg>
                        <use href="#icon-check"></use>
                    </svg>
                    <span class="reg-txt">სწორი: <span id="score-display">0</span> </span>
                </div>
            </div>
            <h2 id="feedback-msg">დააჭირე <span class="orange-txt">ფუტკარს</span>, შემდეგ კი <span
                    class="orange-txt">ყვავილს</span>, რომელიც მიიღება <span class="orange-txt">გამოსახულების</span>
                შედეგად</h2>
            <div class="top-zone">
                <div class="result-board" id="result-board"></div>
                <div class="bee" id="bee" onclick="toggleBee()">
                    <svg>
                        <use href="#beeSvg-element"></use>
                    </svg>
                </div>
            </div>

            <div class="flowers-cont">
                <div class="flower" id="flower-0" onclick="selectFlower(0,this)">
                    <svg>
                        <use href="#flower-1-element"></use>
                    </svg>
                    <div class="flower-center" id="ans-0"></div>
                </div>
                <div class="flower" id="flower-1" onclick="selectFlower(1,this)">
                    <svg>
                        <use href="#flower-2-element"></use>
                    </svg>
                    <div class="flower-center" id="ans-1"></div>
                </div>
                <div class="flower" id="flower-2" onclick="selectFlower(2,this)">
                    <svg>
                        <use href="#flower-3-element"></use>
                    </svg>
                    <div class="flower-center" id="ans-2"></div>
                </div>
            </div>
        </div>
    </main>
    <div id="start-overlay">
        <div class="result-box">
            <h2 class="chalk-txt">დაეხმარე ფუტკარს!</h2>
            <p class="reg-txt grey-txt overlay-subtitle">გაქვს 30 წამი - მიიყვანე სწორ ყვავილთან!</p>
            <div class="button sketchy-button--lg orange-bg push-down-btn chalk-txt" onclick="handleStartGame()">
                დაწყება
            </div>
        </div>
    </div>

    <div id="result-overlay">
        <div class="result-box">
            <h2 class="chalk-txt">დრო ამოიწურა!</h2>
            <p id="result-count" class="reg-txt"></p>
            <p id="result-improved" class="reg-txt"></p>
            <h3 class="chalk-txt heading-3">ქულა: <strong id="result-score" class="orange-txt"></strong></h3>

            <div class="result-star-container">
                <svg class="result-star">
                    <use href="#result-star"></use>
                </svg>
                <svg class="result-star">
                    <use href="#result-star"></use>
                </svg>
                <svg class="result-star">
                    <use href="#result-star"></use>
                </svg>
            </div>

            <div class="rep-map-btns">
                <button id="btn-replay" class="button sketchy-button--md push-down-btn chalk-txt">თავიდან
                    დაწყება</button>
                <button id="btn-map"
                    class="button sketchy-button--md push-down-btn chalk-txt orange-bg white-txt">კუნძულზე
                    დაბრუნება</button>
            </div>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="result-box chalk-txt">
            შედეგი იგზავნება...
        </div>
    </div>

    <footer></footer>
    <script src="../../../../js/config.js"></script>
    <script src="../../../../js/auth.js"></script>
    <script src="../../../../js/game-engine.js"></script>
    <script src="../../../../js/game-submit.js"></script>

    <script src="BeeGame.js"></script>
  </body>
</html>
