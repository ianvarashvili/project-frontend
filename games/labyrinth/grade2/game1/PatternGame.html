<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>გამოიცანი კანონზომიერება</title>
    <link rel="stylesheet" href="../../../../style/general.css" />
    <link rel="stylesheet" href="../../../../style/games-general.css" />
    <link rel="stylesheet" href="PatternGame.css" />
  </head>

  <body>
    <defs>
      <svg xmlns="http://www.w3.org/2000/svg" style="display: none">
        <defs>
          <symbol viewBox="0 0 100 100" id="fruit-apple">
            <g>
              <path
                d="M 50,25 Q 52,10 58,5"
                fill="none"
                stroke="#795548"
                stroke-width="4"
                stroke-linecap="round"
              />
              <path
                d="M 53,15 Q 65,10 68,18 Q 58,25 53,15"
                fill="#4caf50"
                stroke="#2c3e50"
                stroke-width="2"
              />
              <path
                d="M 50,28 C 40,25 20,28 20,53 C 20,78 40,92 50,88 C 60,92 80,78 80,53 C 80,28 60,25 50,28 Z"
                fill="#e53935"
                stroke="#2c3e50"
                stroke-width="4"
                stroke-linejoin="round"
              />
              <ellipse
                cx="35"
                cy="45"
                rx="4"
                ry="8"
                fill="#ffffff"
                transform="rotate(-15 35 45)"
                opacity="0.6"
              />
            </g>
          </symbol>

          <symbol viewBox="0 0 100 100" id="fruit-pear">
            <g>
              <path
                d="M 50,20 Q 53,8 60,4"
                fill="none"
                stroke="#795548"
                stroke-width="4"
                stroke-linecap="round"
              />
              <path
                d="M 52,12 Q 40,5 38,13 Q 46,18 52,12"
                fill="#4caf50"
                stroke="#2c3e50"
                stroke-width="2"
              />
              <path
                d="M 50,22 C 40,22 38,40 32,52 C 24,65 24,86 50,86 C 76,86 76,65 68,52 C 62,40 60,22 50,22 Z"
                fill="#afb42b"
                stroke="#2c3e50"
                stroke-width="4"
                stroke-linejoin="round"
              />
              <ellipse
                cx="40"
                cy="60"
                rx="3"
                ry="7"
                fill="#ffffff"
                transform="rotate(-10 40 60)"
                opacity="0.5"
              />
            </g>
          </symbol>

          <symbol viewBox="0 0 100 100" id="fruit-watermelon">
            <g>
              <path
                d="M 15,45 C 15,75 40,90 50,90 C 60,90 85,75 85,45 Z"
                fill="#2e7d32"
                stroke="#2c3e50"
                stroke-width="4"
                stroke-linejoin="round"
              />
              <path
                d="M 20,45 C 20,70 42,84 50,84 C 58,84 80,70 80,45 Z"
                fill="#a1887f"
                opacity="0.2"
              />
              <path
                d="M 22,45 C 22,68 43,82 50,82 C 57,82 78,68 78,45 Z"
                fill="#81c784"
              />
              <path
                d="M 25,45 C 25,65 44,77 50,77 C 56,77 75,65 75,45 Z"
                fill="#e53935"
                stroke="#2c3e50"
                stroke-width="3"
                stroke-linejoin="round"
              />
              <ellipse
                cx="38"
                cy="53"
                rx="2"
                ry="3"
                fill="#2c3e50"
                transform="rotate(-15 38 53)"
              />
              <ellipse
                cx="45"
                cy="62"
                rx="2"
                ry="3"
                fill="#2c3e50"
                transform="rotate(5 45 62)"
              />
              <ellipse
                cx="55"
                cy="62"
                rx="2"
                ry="3"
                fill="#2c3e50"
                transform="rotate(-5 55 62)"
              />
              <ellipse
                cx="62"
                cy="53"
                rx="2"
                ry="3"
                fill="#2c3e50"
                transform="rotate(15 62 53)"
              />
              <ellipse cx="50" cy="50" rx="2" ry="3" fill="#2c3e50" />
            </g>
          </symbol>
        </defs>
      </svg>
    </defs>
    <header></header>
    <main>
      <div class="games-container chalk-txt">
        <div class="game-hud">
          <div class="hud-stat">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span id="timer-display">60 წმ</span>
          </div>
          <div class="hud-stat">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <span class="reg-txt"
              >სწორი: <span id="score-display">0</span></span
            >
          </div>
        </div>

        <h1 class="heading-1" id="prompt-label">რომელი ხილია შემდეგი?</h1>
        <div class="pattern-cont" id="pattern-cont"></div>
        <div class="options-cont" id="options-cont"></div>
        <h3 id="feedback-msg">
          დააკვირდი <span class="orange-txt">კანონზომიერებას</span> და შეავსე
          გამოტოვებული ადგილი
        </h3>
      </div>
    </main>

    <div id="start-overlay">
      <div class="result-box">
        <h2 class="chalk-txt">სად არის ვარსკვლავი?</h2>
        <p class="reg-txt grey-txt" style="margin: 16px 0 24px 0">
          გაქვს 30 წამი — იპოვე ვარსკვლავი!
        </p>
        <div
          class="button sketchy-button--lg orange-bg push-down-btn chalk-txt"
          onclick="handleStartGame()"
          style="margin: 0 auto; width: 80%"
        >
          დაწყება
        </div>
      </div>
    </div>

    <div id="result-overlay">
      <div class="result-box">
        <h2 class="chalk-txt">დრო ამოიწურა!</h2>
        <p id="result-count" class="reg-txt" style="margin-top: 8px"></p>
        <p id="result-improved" class="reg-txt"></p>

        <h3 class="chalk-txt" style="margin-top: 16px; font-size: 1.5rem">
          ქულა: <strong id="result-score" class="orange-txt"></strong>
        </h3>
        <div class="result-star-container">
          <svg class="result-star" viewBox="0 0 24 24">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
            ></polygon>
          </svg>
          <svg class="result-star" viewBox="0 0 24 24">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
            ></polygon>
          </svg>
          <svg class="result-star" viewBox="0 0 24 24">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
            ></polygon>
          </svg>
        </div>

        <div
          style="
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 24px;
          "
        >
          <button
            id="btn-replay"
            class="button sketchy-button--md push-down-btn chalk-txt"
          >
            თავიდან დაწყება
          </button>
          <button
            id="btn-map"
            class="button sketchy-button--md orange-bg push-down-btn chalk-txt"
          >
            კუნძულზე დაბრუნება
          </button>
        </div>
      </div>
    </div>

    <div id="loading-overlay">
      <div class="result-box chalk-txt">შედეგი იგზავნება...</div>
    </div>

    <script src="../../../../js/config.js"></script>
    <script src="../../../../js/auth.js"></script>
    <script src="../../../../js/game-engine.js"></script>
    <script src="../../../../js/game-submit.js"></script>
    <script src="PatternGame.js"></script>
  </body>
</html>
