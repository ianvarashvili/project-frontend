<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>აირჩიე სწორი ფიგურა</title>
    <link rel="stylesheet" href="../../../../style/general.css" />
    <link rel="stylesheet" href="../../../../style/games-general.css" />
    <link rel="stylesheet" href="shapeGame.css" />
  </head>

  <body>
    <defs>
      <svg style="display: none">
        <defs>
          <symbol
            id="icon-time"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </symbol>
          <symbol
            id="icon-check"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </symbol>
          <symbol id="result-star" viewBox="0 0 24 24">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
            ></polygon>
          </symbol>
          <symbol id="icon-cube" viewBox="0 0 100 100">
            <polygon
              points="50,15 80,30 50,45 20,30"
              fill="#f39c12"
              stroke="currentColor"
              stroke-width="3"
            />
            <polygon
              points="20,30 50,45 50,80 20,65"
              fill="#d35400"
              stroke="currentColor"
              stroke-width="3"
            />
            <polygon
              points="50,45 80,30 80,65 50,80"
              fill="#e67e22"
              stroke="currentColor"
              stroke-width="3"
            />
          </symbol>
          <symbol id="icon-cylinder" viewBox="0 0 100 100">
            <rect
              x="30"
              y="25"
              width="40"
              height="50"
              fill="#3498db"
              stroke="currentColor"
              stroke-width="3"
            />
            <ellipse
              cx="50"
              cy="75"
              rx="20"
              ry="8"
              fill="#2980b9"
              stroke="currentColor"
              stroke-width="3"
            />
            <ellipse
              cx="50"
              cy="25"
              rx="20"
              ry="8"
              fill="#bdc3c7"
              stroke="currentColor"
              stroke-width="3"
            />
          </symbol>
          <symbol id="icon-prism" viewBox="0 0 100 100">
            <rect
              x="15"
              y="45"
              width="50"
              height="35"
              fill="#9b59b6"
              stroke="currentColor"
              stroke-width="3"
            />
            <polygon
              points="15,45 35,20 85,20 65,45"
              fill="#af7ac5"
              stroke="currentColor"
              stroke-width="3"
            />
            <polygon
              points="65,45 85,20 85,55 65,80"
              fill="#884ea0"
              stroke="currentColor"
              stroke-width="3"
            />
          </symbol>
          <symbol id="icon-pyramid" viewBox="0 0 100 100">
            <polygon
              points="50,15 15,75 55,85"
              fill="#f1c40f"
              stroke="currentColor"
              stroke-width="3"
            />
            <polygon
              points="50,15 55,85 85,70"
              fill="#f39c12"
              stroke="currentColor"
              stroke-width="3"
            />
          </symbol>
<symbol id="icon-sphere" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="40" fill="#27ae60" stroke="currentColor" stroke-width="3" />
  
  <path d="M 50,10 A 40,40 0 0,0 50,90 A 24,40 0 0,1 50,10" fill="#2ecc71" stroke="none" />
</symbol>
     
          <symbol id="icon-cone" viewBox="0 0 100 100">
            <polygon
              points="25,30 75,30 50,85"
              fill="#edbb99"
              stroke="currentColor"
              stroke-width="3"
            />
            <ellipse
              cx="50"
              cy="30"
              rx="25"
              ry="8"
              fill="#e59866"
              stroke="currentColor"
              stroke-width="3"
            />
          </symbol>
        </defs>
      </svg>
    </defs>

    <header></header>
    <main>
      <div class="games-container chalk-txt">
        <h1 class="heading-1">
          აირჩიე სწორი <span class="orange-txt">ფორმა!</span>
        </h1>
        <div class="game-hud">
          <div class="hud-stat">
            <svg>
              <use href="#icon-time"></use>
            </svg>
            <span id="timer-display">60 წმ</span>
          </div>

          <div class="hud-stat">
            <svg>
              <use href="#icon-check"></use>
            </svg>
            <span class="reg-txt"
              >სწორი: <span id="score-display">0</span>
            </span>
          </div>
        </div>
        <div class="shape-game cards" id="item-card">
          <h2 id="feedback-msg">აირჩიე სწორი ფორმა</h2>
          <div id="obj-visual-cont"></div>
          <div class="prompt-txt" id="prompt-label">იტვირთება...</div>
          
        </div>

        <div class="opts-cont" id="options-cont">
          <div class="shape-opt" onclick="checkAns('cube')">
            <svg class="ui-shape-icon">
              <use href="#icon-cube"></use>
            </svg>
            <span class="ui-txt" style="font-weight: bold">კუბი</span>
          </div>

          <div class="shape-opt" onclick="checkAns('cylinder')">
            <svg class="ui-shape-icon">
              <use href="#icon-cylinder"></use>
            </svg>
            <span class="ui-txt" style="font-weight: bold">ცილინდრი</span>
          </div>

          <div class="shape-opt" onclick="checkAns('prism')">
            <svg class="ui-shape-icon">
              <use href="#icon-prism"></use>
            </svg>
            <span class="ui-txt" style="font-weight: bold">პრიზმა</span>
          </div>

          <div class="shape-opt" onclick="checkAns('pyramid')">
            <svg class="ui-shape-icon">
              <use href="#icon-pyramid"></use>
            </svg>
            <span class="ui-txt" style="font-weight: bold">პირამიდა</span>
          </div>

          <div class="shape-opt" onclick="checkAns('sphere')">
            <svg class="ui-shape-icon">
              <use href="#icon-sphere"></use>
            </svg>
            <span class="ui-txt" style="font-weight: bold">სფერო</span>
          </div>

          <div class="shape-opt" onclick="checkAns('cone')">
            <svg class="ui-shape-icon">
              <use href="#icon-cone"></use>
            </svg>
            <span class="ui-txt" style="font-weight: bold">კონუსი</span>
          </div>
        </div>
      </div>
    </main>
    <div id="start-overlay">
      <div class="result-box">
        <h2 class="chalk-txt">აირჩიე სწორი ფორმა!</h2>
        <p class="reg-txt grey-txt overlay-subtitle">
          გაქვს 30 წამი - შეუსაბამე ფორმები საგნებს!
        </p>
        <div
          class="button sketchy-button--lg orange-bg push-down-btn chalk-txt"
          onclick="handleStartGame()"
        >
          დაწყება
        </div>
      </div>
    </div>

    <div id="result-overlay">
      <div class="result-box">
        <h2 class="chalk-txt">დრო ამოიწურა!</h2>
        <p id="result-count" class="reg-txt"></p>
        <p id="result-improved" class="reg-txt"></p>
        <h3 class="chalk-txt heading-3">
          ქულა: <strong id="result-score" class="orange-txt"></strong>
        </h3>

        <div class="result-star-container">
          <svg class="result-star">
            <use href="#result-star"></use>
          </svg>
          <svg class="result-star">
            <use href="#result-star"></use>
          </svg>
          <svg class="result-star">
            <use href="#result-star"></use>
          </svg>
        </div>

        <div class="rep-map-btns">
          <button
            id="btn-replay"
            class="button sketchy-button--md push-down-btn chalk-txt"
          >
            თავიდან დაწყება
          </button>
          <button
            id="btn-map"
            class="button sketchy-button--md push-down-btn chalk-txt orange-bg white-txt"
          >
            კუნძულზე დაბრუნება
          </button>
        </div>
      </div>
    </div>

    <div id="loading-overlay">
      <div class="result-box chalk-txt">შედეგი იგზავნება...</div>
    </div>
    <footer></footer>

    <script src="../../../../js/config.js"></script>
    <script src="../../../../js/auth.js"></script>
    <script src="../../../../js/game-engine.js"></script>
    <script src="../../../../js/game-submit.js"></script>
    <script src="shapeGame.js"></script>
  </body>
</html>
